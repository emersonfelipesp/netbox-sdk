[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "netbox-console"
version = "0.0.2"
description = "API-first NetBox CLI + Textual TUI"
readme = "README.md"
requires-python = ">=3.11"
authors = [
  { name = "Emerson Felipe", email = "emerson@netdevopsbr.com" }
]
maintainers = [
  {name = "Emerson Felipe", email = "emerson@netdevopsbr.com"}
]
keywords = ["netbox", "terminal", "netbox-integration", "tui", "cli", "terminal", "api", "integration"]
dependencies = [
  "aiohttp>=3.9.0",
  "playwright>=1.52.0",
  "pydantic>=2.0",
  "typer>=0.12.0",
  "rich>=13.7.0",
  "textual>=0.62.0",
  "pyyaml>=6.0.0",
]

[project.optional-dependencies]
dev = [
  "pre-commit>=4.0.0",
  "pytest>=8.0.0",
  "pytest-asyncio>=0.23.0",
  "pytest-timeout>=2.3.0",
  "pytest-xdist>=3.5.0",
  "ruff>=0.11.0",
]
docs = [
  "mkdocs-material>=9.5",
]

[dependency-groups]
dev = [
  "pre-commit>=4.0.0",
  "pytest>=8.0.0",
  "pytest-asyncio>=0.23.0",
  "pytest-timeout>=2.3.0",
  "pytest-xdist>=3.5.0",
  "ruff>=0.11.0",
]
docs = [
  "mkdocs-material>=9.5",
]

[project.scripts]
nbx = "netbox_cli.cli:main"

[tool.setuptools]
include-package-data = true

[tool.setuptools.packages.find]
where = ["."]
include = ["netbox_cli*"]

[tool.setuptools.package-data]
netbox_cli = ["*.tcss", "themes/*.json", "reference/openapi/*.json"]

[tool.pytest.ini_options]
pythonpath = ["."]
testpaths = ["tests"]
asyncio_mode = "auto"
addopts = "--tb=short -n auto"
timeout = 60

[tool.ruff]
target-version = "py311"
line-length = 100

[tool.ruff.lint]
select = [
  "E",
  "F",
  "I",
  "UP",
  "W",
]
ignore = ["E501"]

[tool.ruff.lint.isort]
known-first-party = ["netbox_cli"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
