repos:
  - repo: local
    hooks:
      - id: ruff-check-fix
        name: ruff-check-fix
        entry: uv run ruff check --fix
        language: system
        types_or: [python, pyi]
        stages: [pre-commit]
      - id: ruff-format
        name: ruff-format
        entry: uv run ruff format
        language: system
        types_or: [python, pyi]
        stages: [pre-commit]
      - id: ty-check
        name: ty-check
        entry: uv run ty check netbox_sdk netbox_cli netbox_tui tests --output-format concise
        language: system
        pass_filenames: false
        stages: [pre-commit]
      - id: ruff-check-push
        name: ruff-check-push
        entry: uv run ruff check
        language: system
        types_or: [python, pyi]
        stages: [pre-push]
      - id: ruff-format-check-push
        name: ruff-format-check-push
        entry: uv run ruff format --check
        language: system
        types_or: [python, pyi]
        stages: [pre-push]
