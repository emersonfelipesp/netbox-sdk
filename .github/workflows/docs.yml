name: Build and deploy documentation

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write   # needed for gh-deploy to push to gh-pages branch

jobs:
  build-and-deploy:
    name: Build MkDocs and deploy to GitHub Pages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0    # full history for git-committer-date in MkDocs

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install netbox-cli and docs + dev dependencies
        run: pip install -e ".[docs,dev]"

      # ── Docgen: regenerate captured CLI output ────────────────────────────
      # These steps are skipped when DEMO_USERNAME / DEMO_PASSWORD secrets
      # are not configured (e.g. forks).  Required secrets:
      #   DEMO_USERNAME  →  nbxuser
      #   DEMO_PASSWORD  →  @nm12345678
      - name: Install Playwright and Chromium browser
        if: ${{ secrets.DEMO_USERNAME && secrets.DEMO_PASSWORD }}
        run: |
          pip install playwright
          playwright install chromium --with-deps

      - name: Authenticate with demo.netbox.dev
        if: ${{ secrets.DEMO_USERNAME && secrets.DEMO_PASSWORD }}
        run: |
          nbx demo init \
            --username "${{ secrets.DEMO_USERNAME }}" \
            --password "${{ secrets.DEMO_PASSWORD }}" \
            --headless

      - name: Regenerate command capture docs
        if: ${{ secrets.DEMO_USERNAME && secrets.DEMO_PASSWORD }}
        run: nbx docs generate-capture

      # ── Build + deploy ────────────────────────────────────────────────────
      - name: Configure git identity for gh-deploy
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Build and deploy docs to GitHub Pages
        run: mkdocs gh-deploy --force --clean --verbose
