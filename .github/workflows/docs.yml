name: Build and deploy documentation

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write   # needed for gh-deploy to push to gh-pages branch

jobs:
  build-and-deploy:
    name: Build MkDocs and deploy to GitHub Pages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0    # full history for git-committer-date in MkDocs

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install netbox-cli and docs + dev dependencies
        run: pip install -e ".[docs,dev]"

      # ── Docgen: regenerate captured CLI output ────────────────────────────
      # Skipped automatically when DEMO_USERNAME / DEMO_PASSWORD are absent.
      # Required repository secrets:
      #   DEMO_USERNAME  →  nbxuser
      #   DEMO_PASSWORD  →  @nm12345678
      - name: Regenerate command capture docs
        env:
          DEMO_USERNAME: ${{ secrets.DEMO_USERNAME }}
          DEMO_PASSWORD: ${{ secrets.DEMO_PASSWORD }}
        run: |
          if [ -z "$DEMO_USERNAME" ] || [ -z "$DEMO_PASSWORD" ]; then
            echo "Demo secrets not configured — skipping docgen."
            exit 0
          fi
          pip install playwright
          playwright install chromium --with-deps
          nbx demo init --username "$DEMO_USERNAME" --password "$DEMO_PASSWORD" --headless
          nbx docs generate-capture

      # ── Build + deploy ────────────────────────────────────────────────────
      - name: Configure git identity for gh-deploy
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Build and deploy docs to GitHub Pages
        run: mkdocs gh-deploy --force --clean --verbose
