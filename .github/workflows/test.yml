name: Tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  changes:
    name: detect test scope
    runs-on: ubuntu-latest
    outputs:
      run_all: ${{ steps.filter.outputs.run_all }}
      sdk: ${{ steps.filter.outputs.sdk }}
      cli: ${{ steps.filter.outputs.cli }}
      tui: ${{ steps.filter.outputs.tui }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect changed areas
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            run_all:
              - 'pyproject.toml'
              - 'uv.lock'
              - 'tests/conftest.py'
              - '.github/workflows/test.yml'
              - '.github/workflows/main-post-merge.yml'
              - '.github/workflows/publish-testpypi.yml'
            sdk:
              - 'netbox_sdk/**'
              - 'tests/test_api_auth.py'
              - 'tests/test_api_cache.py'
              - 'tests/test_config_profiles.py'
              - 'tests/test_demo_auth.py'
              - 'tests/test_logging_runtime.py'
              - 'tests/test_mock_api.py'
              - 'tests/test_output_safety.py'
              - 'tests/test_plugin_discovery.py'
              - 'tests/test_schema_index.py'
              - 'tests/test_docs_alignment.py'
              - 'tests/test_return_annotations.py'
              - 'tests/test_sdk_completeness.py'
              - 'tests/test_sdk_imports.py'
              - 'tests/test_sdk_pynetbox_parity.py'
              - 'tests/test_services.py'
              - 'tests/test_typed_sdk.py'
              - 'tests/test_security_sdk.py'
            cli:
              - 'netbox_cli/**'
              - 'tests/test_cli_error_handling.py'
              - 'tests/test_cli_new_options.py'
              - 'tests/test_cli_trace.py'
              - 'tests/test_demo_cli.py'
              - 'tests/test_demo_runtime_refresh.py'
              - 'tests/test_docgen_paths.py'
              - 'tests/test_graphql.py'
              - 'tests/test_instance_isolation.py'
              - 'tests/test_markdown_output.py'
              - 'tests/test_security_cli.py'
            tui:
              - 'netbox_tui/**'
              - 'tests/test_cli_tui.py'
              - 'tests/test_cli_tui_theme.py'
              - 'tests/test_dev_tui.py'
              - 'tests/test_django_model_tui.py'
              - 'tests/test_logo_render.py'
              - 'tests/test_logs_tui.py'
              - 'tests/test_no_hardcoded_colors.py'
              - 'tests/test_theme_registry.py'
              - 'tests/test_tui_interaction.py'
              - 'tests/test_security_tui.py'

  # ------------------------------------------------------------------ #
  # Branch / PR jobs — mock API only, no real NetBox container          #
  # ------------------------------------------------------------------ #

  test-sdk:
    name: sdk suite / Python ${{ matrix.python-version }}
    needs: changes
    if: ${{ !(github.event_name == 'push' && github.ref_name == 'main') && needs.changes.outputs.run_all != 'true' && needs.changes.outputs.sdk == 'true' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Sync development environment
        run: uv sync --dev --extra cli --extra tui --extra demo --extra mock --locked

      - name: Run netbox_sdk suite (with mock API)
        run: uv run pytest -v --tb=short -p no:randomly -m suite_sdk

  test-cli:
    name: cli suite / Python ${{ matrix.python-version }}
    needs: changes
    if: ${{ !(github.event_name == 'push' && github.ref_name == 'main') && needs.changes.outputs.run_all != 'true' && needs.changes.outputs.cli == 'true' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Sync development environment
        run: uv sync --dev --extra cli --extra tui --extra demo --extra mock --locked

      - name: Run netbox_cli suite
        run: uv run pytest -v --tb=short -p no:randomly -m suite_cli

  test-tui:
    name: tui suite / Python ${{ matrix.python-version }}
    needs: changes
    if: ${{ !(github.event_name == 'push' && github.ref_name == 'main') && needs.changes.outputs.run_all != 'true' && needs.changes.outputs.tui == 'true' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Sync development environment
        run: uv sync --dev --extra cli --extra tui --extra demo --extra mock --locked

      - name: Run netbox_tui suite
        run: uv run pytest -v --tb=short -p no:randomly -m suite_tui

  test-all-mock:
    name: full suite / mock API / Python ${{ matrix.python-version }}
    needs: changes
    if: ${{ !(github.event_name == 'push' && github.ref_name == 'main') && needs.changes.outputs.run_all == 'true' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Sync development environment
        run: uv sync --dev --extra cli --extra tui --extra demo --extra mock --locked

      - name: Run full test suite (mock API)
        run: uv run pytest -v --tb=short -p no:randomly

  # ------------------------------------------------------------------ #
  # main branch — mock API suite + real NetBox container                #
  # ------------------------------------------------------------------ #

  test-all-mock-main:
    name: full suite / mock API / Python ${{ matrix.python-version }} [main]
    needs: changes
    if: ${{ github.event_name == 'push' && github.ref_name == 'main' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Sync development environment
        run: uv sync --dev --extra cli --extra tui --extra demo --extra mock --locked

      - name: Run full test suite (mock API)
        run: uv run pytest -v --tb=short -p no:randomly

  test-live-netbox:
    name: live NetBox ${{ matrix.netbox-version }} / Python 3.11
    needs: changes
    if: ${{ github.event_name == 'push' && github.ref_name == 'main' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        netbox-version: ["v4.5.8", "v4.5.9", "v4.6.0-beta2"]
    # Only postgres and redis as service containers — netbox is started
    # manually in a step so postgres is healthy before netbox connects.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: netbox
          POSTGRES_USER: netbox
          POSTGRES_PASSWORD: netbox
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U netbox"
          --health-interval 5s
          --health-retries 10
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-retries 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Sync development environment
        run: uv sync --dev --extra cli --extra tui --extra demo --extra mock --locked

      - name: Start NetBox container
        # postgres and redis are healthy before this step runs (GitHub Actions
        # guarantees service container health before starting steps).
        # Use --network host so the container reaches localhost:5432 / :6379.
        run: |
          docker run -d \
            --name netbox-ci \
            --network host \
            -e SECRET_KEY="ci-secret-key-for-testing-only-not-for-production-use" \
            -e ALLOWED_HOSTS="*" \
            -e DB_HOST=127.0.0.1 \
            -e DB_PORT=5432 \
            -e DB_NAME=netbox \
            -e DB_USER=netbox \
            -e DB_PASSWORD=netbox \
            -e REDIS_HOST=127.0.0.1 \
            -e REDIS_PORT=6379 \
            -e SUPERUSER_NAME=admin \
            -e SUPERUSER_EMAIL=admin@example.com \
            -e SUPERUSER_PASSWORD=netbox-test-password \
            -e SUPERUSER_API_TOKEN=0123456789abcdef0123456789abcdef01234567 \
            ghcr.io/netbox-community/netbox:${{ matrix.netbox-version }}

      - name: Wait for NetBox to be ready
        run: |
          echo "Waiting for NetBox to be ready..."
          for i in $(seq 1 30); do
            status=$(curl -sf http://localhost:8080/api/status/ 2>/dev/null \
              | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('netbox-version',''))" 2>/dev/null || echo "")
            if [ -n "$status" ]; then
              echo "NetBox $status is ready"
              break
            fi
            echo "  attempt $i/30 — not ready yet, sleeping 10s"
            sleep 10
          done

      - name: Set NetBox connection env vars
        run: |
          echo "NETBOX_TOKEN=0123456789abcdef0123456789abcdef01234567" >> $GITHUB_ENV
          echo "NETBOX_URL=http://localhost:8080" >> $GITHUB_ENV

      - name: Run live NetBox integration tests
        env:
          NETBOX_URL: ${{ env.NETBOX_URL }}
          NETBOX_TOKEN: ${{ env.NETBOX_TOKEN }}
          NETBOX_LIVE_TEST: "1"
        run: uv run pytest -v --tb=short -p no:randomly -m suite_sdk
