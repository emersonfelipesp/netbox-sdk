name: Lint and Format

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  lint:
    name: pre-commit / Python 3.13
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Sync development environment
        run: uv sync --dev --extra cli --extra tui --extra demo --locked

      - name: Run ty type checks
        run: uv run ty check netbox_sdk netbox_cli netbox_tui tests --output-format concise

      - name: Run pre-commit checks
        run: uv run pre-commit run --all-files --show-diff-on-failure --color=always
