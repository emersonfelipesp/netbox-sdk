name: Build Django Model Graphs

on:
  schedule:
    - cron: "0 0 * * 0"  # Weekly Sunday 00:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build last 3 NetBox releases
    runs-on: ubuntu-latest

    steps:
      - name: Checkout netbox-cli
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install netbox-cli
        run: uv sync --locked

      - name: Get last 3 NetBox release tags
        id: releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAGS=$(gh api repos/netbox-community/netbox/releases --paginate --jq '.[0:3] | .[].tag_name')
          echo "tags<<EOF" >> "$GITHUB_OUTPUT"
          echo "$TAGS" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          echo "Found releases: $TAGS"

      - name: Build model graphs
        run: |
          mkdir -p django_models_builds
          for TAG in ${{ steps.releases.outputs.tags }}; do
            echo "::group::Building $TAG"
            CHECKOUT_DIR="/tmp/netbox-${TAG}"
            git clone --depth 1 --branch "$TAG" \
              https://github.com/netbox-community/netbox.git "$CHECKOUT_DIR"
            uv run nbx dev django-model build --rebuild \
              --netbox-root "$CHECKOUT_DIR/netbox/" \
              --cache-path "django_models_builds/${TAG}-django-models-build.json"
            rm -rf "$CHECKOUT_DIR"
            echo "::endgroup::"
          done

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add django_models_builds/
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            TAGS=$(ls django_models_builds/*.json 2>/dev/null | sed 's/.*\///;s/-django-models-build.json//' | tr '\n' ', ' | sed 's/,$//')
            git commit -m "build(django-models): update last 3 NetBox releases ($TAGS)"
            git push
          fi
